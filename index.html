<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>homepage</title>
  </head>
  <body>
    <header>
      <h1>DestructionDNR 4</h1>
      <nav>
        <a href="./">homepage</a>
        <a href="./myapp.html">myapp</a>
      </nav>
    </header>
    <div class="swipers">
      <div style="text-align: center">
        <div class="swiper swiper1">
          <div class="swiper-wrapper">
            <div class="swiper-slide">1A</div>
            <div class="swiper-slide">1B</div>
            <div class="swiper-slide">1C</div>
          </div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
        <div id="swiperlabel">Slide1</div>
      </div>
      <!--NEXT SWIPER-->
      <div style="text-align: center">
        <div class="swiper swiper2">
          <div class="swiper-wrapper">
            <div class="swiper-slide">2A</div>
            <div class="swiper-slide">2B</div>
            <div class="swiper-slide">2C</div>
          </div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
        <div id="swiperlabel2">Slide1</div>
      </div>
    </div>

    <!-- FORM FORM FORM FORM FORM FORM FORM FORM FORM FORM FORM FORM FORM FORM-->
    <div class="roundedbox">
      <form id="basic_form" class="formfull">
        <div class="formfield">
          <label>name</label>
          <input
            id="basic_name"
            name="name"
            type="text"
            placeholder="Enter your name"
          />
        </div>
        <div class="formfield">
          <label>email address</label>
          <input
            id="basic_email"
            name="email"
            type="text"
            placeholder="Enter your email"
          />
        </div>
        <div class="formfield">
          <label>password</label>
          <input
            id="basic_password"
            name="password"
            type="text"
            placeholder="Enter your password"
          />
        </div>
        <div class="formfield">
          <label>age</label>
          <input
            id="basic_age"
            name="age"
            type="text"
            placeholder="Enter your age"
          />
        </div>
        <div class="formfield">
          <label>address</label>
          <input
            id="basic_address"
            name="address"
            type="text"
            placeholder="Enter your address"
          />
        </div>
        <div class="formfield">
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
